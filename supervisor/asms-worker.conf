[program:asms-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/ASMS/artisan queue:work --sleep=3 --tries=3 --timeout=300 --queue=default
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/ASMS/storage/logs/worker.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stopwaitsecs=300
